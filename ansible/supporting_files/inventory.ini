# =============================================================================
# ansible/supporting_files/inventory.ini
# Static inventory file. For dynamic inventories (AWS EC2, GCP, etc.)
# replace this with an inventory plugin YAML file or a dynamic script.
# Reference: https://docs.ansible.com/ansible/latest/inventory_guide/
# =============================================================================

# ---------------------------------------------------------------------------
# [local_vms] — Lima VMs running on this Mac.
# Lima maps each VM's SSH port to a localhost port.
# Run `limactl list` to see the SSH port for each VM.
# ---------------------------------------------------------------------------
[local_vms]
# lima-ubuntu ansible_host=127.0.0.1 ansible_port=60022 ansible_user=pete ansible_ssh_private_key_file=~/.ssh/id_ed25519

# ---------------------------------------------------------------------------
# [cloud] — remote cloud instances.
# Replace IP addresses with actual hostnames or Elastic IPs.
# ---------------------------------------------------------------------------
[cloud]
# web01 ansible_host=203.0.113.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/cloud_key.pem
# web02 ansible_host=203.0.113.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/cloud_key.pem

# ---------------------------------------------------------------------------
# Group variables
# ---------------------------------------------------------------------------
[local_vms:vars]
# Ansible's Python interpreter auto-detection can be slow on first run.
# Explicitly specifying the path avoids the discovery overhead.
ansible_python_interpreter=/usr/bin/python3

[cloud:vars]
ansible_python_interpreter=/usr/bin/python3
# Uncomment if cloud hosts require sudo for privileged tasks:
# ansible_become=true
# ansible_become_method=sudo

# ---------------------------------------------------------------------------
# [all:vars] — variables applied to ALL hosts
# ---------------------------------------------------------------------------
[all:vars]
# Ansible will use this SSH timeout for initial connection attempts.
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ConnectTimeout=10'
