# =============================================================================
# ansible/supporting_files/ansible.cfg
# Project-level Ansible configuration.
# This file takes precedence over /etc/ansible/ansible.cfg and ~/.ansible.cfg
# when Ansible is run from a directory containing (or above) this file.
# Reference: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
# =============================================================================

[defaults]
# Inventory file used when -i is not specified on the command line.
inventory = inventory.ini

# Number of parallel SSH connections. macOS default ulimit for open files is
# 256 (vs 1024+ on Linux) — keep forks well below that.
forks = 10

# SSH connection timeout in seconds.
timeout = 30

# Suppress deprecation warnings for cleaner output. Remove to see all warnings.
deprecation_warnings = False

# Retry files are written when a playbook partially fails.
# Disable them to keep the working directory clean on macOS.
retry_files_enabled = False

# Output callback: 'yaml' produces human-readable, coloured diffs.
# Other options: 'minimal', 'json' (for CI), 'debug'.
stdout_callback = yaml

# Fact caching: store gathered facts between runs to speed up subsequent runs.
# Setting type to 'jsonfile' caches to disk. The cache path uses
# ~/Library/Application Support/ (macOS standard) instead of ~/.ansible/facts.d/
fact_caching             = jsonfile
fact_caching_connection  = ~/Library/Application Support/ansible/facts
fact_caching_timeout     = 3600   # 1 hour

[ssh_connection]
# ControlMaster multiplexing reuses a single SSH connection for multiple
# Ansible tasks on the same host — significantly speeds up playbook runs.
#
# IMPORTANT macOS note: the ControlPath socket path has a 104-byte limit on
# macOS (BSD kernel) vs 108 bytes on Linux. Using /tmp/ avoids hitting the
# limit that would occur if $HOME is a long path (e.g. /Users/longusername/).
# %%h=hostname %%p=port %%r=remote_user — these are literal percent-signs.
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s
control_path        = /tmp/ansible-%%h-%%p-%%r
control_path_dir    = /tmp/ansible-cp

# Pipelining reduces the number of SSH connections per task by batching
# multiple operations. Requires `Defaults !requiretty` in /etc/sudoers on
# managed nodes. Disabled by default for compatibility.
pipelining = False

[privilege_escalation]
# Default to sudo for privilege escalation. On Lima VMs, the default user
# typically has passwordless sudo configured.
become        = False
become_method = sudo
become_user   = root
become_ask_pass = False
