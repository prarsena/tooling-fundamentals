# =============================================================================
# networking/configs/cloudflared-config.yaml
# Cloudflare Tunnel configuration for persistent named tunnels.
#
# Quick-start (no config file or login needed):
#   cloudflared tunnel --url http://localhost:8080
#   # Outputs a random *.trycloudflare.com URL immediately.
#
# Named tunnel setup (permanent, maps to your domain):
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create <name>          # returns <TUNNEL_ID>
#   3. cloudflared tunnel route dns <name> myapp.example.com
#   4. Edit this file — fill in TUNNEL_ID and credentials-file path.
#   5. cloudflared tunnel run --config configs/cloudflared-config.yaml
#
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/
# =============================================================================

# The UUID of the named tunnel created by `cloudflared tunnel create`.
# Run `cloudflared tunnel list` to find it.
tunnel: <YOUR_TUNNEL_ID>

# Path to the tunnel credentials JSON file generated by `cloudflared tunnel create`.
# On macOS this is written to ~/.cloudflared/<TUNNEL_ID>.json by default.
credentials-file: ~/.cloudflared/<YOUR_TUNNEL_ID>.json

# ---------------------------------------------------------------------------
# Ingress rules
# Evaluated top-to-bottom; the first matching rule wins.
# The final rule MUST be a catch-all (no hostname/path).
# ---------------------------------------------------------------------------
ingress:

  # Route traffic from your public hostname to a local service.
  # Replace myapp.example.com with your actual DNS name.
  - hostname: myapp.example.com
    service: http://localhost:8080

  # Example: route a second subdomain
  # - hostname: api.example.com
  #   service: http://localhost:9090

  # Example: forward WebSocket connections (supported natively in cloudflared)
  # - hostname: ws.example.com
  #   service: ws://localhost:3000

  # Example: SSH over Cloudflare Tunnel (requires cloudflared on client too)
  # - hostname: ssh.example.com
  #   service: ssh://localhost:22

  # Catch-all rule (required — cloudflared will error without it).
  # Returns a 404 for any request that does not match the rules above.
  - service: http_status:404

# ---------------------------------------------------------------------------
# Optional: DNS over HTTPS proxy (DoH)
# When enabled, cloudflared acts as a local DNS resolver that forwards
# queries over HTTPS to Cloudflare's 1.1.1.1 or another DoH provider.
#
# Usage: cloudflared proxy-dns --port 5053
# Then point /etc/resolv.conf or macOS Network Preferences to 127.0.0.1:5053.
# ---------------------------------------------------------------------------
# proxy-dns: true
# proxy-dns-port: 5053
# proxy-dns-upstream:
#   - https://1.1.1.1/dns-query
#   - https://1.0.0.1/dns-query
